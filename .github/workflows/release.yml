name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build pyembed.exe
        run: python scripts/build_exe.py

      - name: Get version from tag
        id: version
        run: |
          $ver = $env:GITHUB_REF -replace '^refs/tags/v',''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Name exe with version
        run: Copy-Item dist\pyembed.exe "dist\pyembed-${{ steps.version.outputs.VERSION }}.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          generate_release_notes: true
          files: dist/pyembed-${{ steps.version.outputs.VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
